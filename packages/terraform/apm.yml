name: terraform-deployer-apm
version: 1.0.0
featured: true
description: >
  Terraform provider upgrades, IaC deployment, and GitHub Agentic Workflow
  skills and agents for GitHub Copilot.
author: thomast1906
license: MIT
target: vscode

dependencies:
  apm:
    # Agents
    - thomast1906/github-copilot-agent-skills/.github/agents/terraform-provider-upgrade.agent.md
    - thomast1906/github-copilot-agent-skills/.github/agents/gh-aw-builder.agent.md
    # Skills
    - thomast1906/github-copilot-agent-skills/.github/skills/terraform-module-creator
    - thomast1906/github-copilot-agent-skills/.github/skills/terraform-provider-upgrade
  mcp:
    # Requires Docker to be running
    - name: terraform
      registry: false
      transport: stdio
      command: docker
      args:
        - run
        - -i
        - --rm
        - -e
        - TFE_TOKEN
        - -e
        - TFE_ADDRESS
        - hashicorp/terraform-mcp-server:0.5.1
      env:
        TFE_TOKEN: "${input:tfe_token}"
        TFE_ADDRESS: "${input:tfe_address}"
